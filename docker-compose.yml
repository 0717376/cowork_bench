services:
  postgres:
    image: postgres:15
    container_name: cowork_pg
    environment:
      POSTGRES_DB: cowork_gym
      POSTGRES_USER: eigent
      POSTGRES_PASSWORD: camel
    ports:
      # Host port 5432 may already be in use by other local postgres instances.
      # Internal bridge network access (cowork_pg:5432) is unaffected.
      - "15433:5432"
    volumes:
      - ./db/init.sql.gz:/docker-entrypoint-initdb.d/init.sql.gz
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eigent -d cowork_gym"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cowork_net

  # Development shell: mounts live source code, connects to shared postgres.
  # For isolated per-task runs use scripts/run_containerized.sh instead.
  cowork:
    build: .
    image: cowork-pack:latest
    container_name: cowork_agent
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      PGHOST: postgres
      PG_HOST: postgres
      PGPORT: "5432"
      PGUSER: eigent
      PGPASSWORD: camel
      PGDATABASE: cowork_gym
      LOCAL_SERVERS_PATH: /opt/local_servers
      PYTHON_BIN: /opt/venv/bin/python3
    stdin_open: true
    tty: true
    command: /bin/bash
    networks:
      - cowork_net

volumes:
  pg_data:

networks:
  # Shared bridge network so ephemeral task containers can reach cowork_pg.
  cowork_net:
    name: cowork_net
