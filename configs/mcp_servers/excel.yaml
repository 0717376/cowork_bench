# Excel
# Source: https://github.com/haris-musa/excel-mcp-server
# Toolathlon Version: The same
# Cowork_Bench: ../../local_servers/excel-mcp-server
type: stdio
name: excel
params:
  command: uv
  args:
    - "run"
    - "--project"
    - "${local_servers_paths}/excel-mcp-server"
    - "excel-mcp-server"
    - "stdio"
  cwd: "${agent_workspace}"
client_session_timeout_seconds: 100
cache_tools_list: true