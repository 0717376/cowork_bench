# Teamly — российский аналог Confluence (spaces + pages поверх Postgres).
# Cowork_Bench: ../../local_servers/teamly-mcp
# Схема teamly.* в БД toolathlon, сиды в db/zzz_teamly_after_init.sql.
type: stdio
name: teamly
params:
  command: node
  args:
    - "${local_servers_paths}/teamly-mcp/build/index.js"
  env:
    PG_HOST: "cowork_pg"
    PG_PORT: "5432"
    PG_DATABASE: "cowork_gym"
    PG_USER: "eigent"
    PG_PASSWORD: "camel"
client_session_timeout_seconds: 60
cache_tools_list: true
